<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мир 25x25</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="layout">
    <section class="map-card">
      <div class="map-header">
        <h1>🌍 Карта мира</h1>
        <p>Сетка 25x25. Выберите объект и действие.</p>
      </div>

      <div id="map" class="map" aria-label="Игровая карта"></div>

      <div class="legend">
        <span><i class="dot castle"></i>Замок</span>
        <span><i class="dot village"></i>Деревня</span>
        <span><i class="dot resource"></i>Ресурс</span>
      </div>
    </section>

    <aside class="panel-card">
      <h2>Информация</h2>
      <div id="objectInfo" class="object-info">Нажмите на объект на карте.</div>

      <div class="actions">
        <button id="attackBtn" class="action attack" disabled>Атака</button>
        <button id="scoutBtn" class="action scout" disabled>Разведка</button>
        <button id="gatherBtn" class="action gather" disabled>Сбор</button>
      </div>

      <p id="statusLine" class="status">Статус: ожидание действия</p>
    </aside>
  </main>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="./app.js"></script>
</body>
</html>
